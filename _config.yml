# ===================== 站点核心配置 =====================
title: Duckweed's Space
email: 3071974740@qq.com
description: >-
  Duckweed的个人成长空间，记录编程学习、考研备考、读书思考的点滴
baseurl: ""
url: "https://Duckweed-yhb.github.io"
timezone: Asia/Shanghai
lang: zh-CN  # 匹配你的页面语言，避免默认英文

# ===================== 主题与插件配置 =====================
theme: minima
plugins:
  - jekyll-feed
  - jekyll-paginate

# ===================== 内容配置 =====================
defaults:
  # 文章默认使用 post 布局（继承你的default布局）
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      math: true  # 所有文章默认加载MathJax
  # pages 目录下的页面默认使用 default 布局（你的自定义布局）
  - scope:
      path: "pages"
      type: "pages"
    values:
      layout: "default"
  # 根目录 index.md 强制使用 default 布局（你的自定义布局）
  - scope:
      path: "index.md"
      type: "pages"
    values:
      layout: "default"
      permalink: "/"

# 分页配置
paginate: 5
paginate_path: "/page/:num/"

# 导航栏配置（添加展览页面，顺序：档案 → 展览 → 友链，无重复）
header_pages:
  - pages/archive.md
  - pages/exhibition.md  # 新增：展览页面，显示「展览」导航项
  - pages/friends.md

# ===================== 排除文件 =====================
exclude:
  - .sass-cache/
  - .jekyll-cache/
  - gemfiles/
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - vendor/
  - README.md
  - LICENSE
  - templates/
  - scripts/
  - requirements.txt

# ===================== Minima主题自定义 =====================
minima:
  social_links: [] # 清空内置社交链接，用你的自定义
  skin: auto

# ===================== 编码与格式 =====================
encoding: utf-8
date_format: "%Y-%m-%d %H:%M"