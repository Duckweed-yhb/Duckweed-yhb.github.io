timezone: Asia/Shanghai # 时区：上海
lang: zh-CN # 站点语言：简体中文
github_username: Duckweed-yhb
zhihu_url: "https://www.zhihu.com/people/54-62-1-34-68"  # 根级配置（匹配social.html）
zhihu_username: "待价而沽"
bilibili_url: "https://space.bilibili.com/3546703303019495"  # 根级配置
bilibili_username: "Duckweed"
logo: "/assets/images/bg.jpg" # 新增：站点logo（可选）
favicon: "/assets/images/bg.jpg" # 新增：浏览器标签页图标
markdown_ext: "markdown,md" # 新增：关键！识别.markdown和.md后缀

# ===================== 主题与插件配置 =====================
theme: minima
plugins:
  - jekyll-feed # RSS 订阅
  - jekyll-seo-tag # SEO 优化
  - jekyll-sitemap # 新增：生成站点地图（利于SEO）
  # - jekyll-paginate  # 分页插件（后续需要时取消注释）

# ===================== 内容配置 =====================
# 全局默认布局与属性（核心修复区）
defaults:
  # 文章默认配置：强制开启Liquid解析，确保Jekyll识别文章
  - scope:
      path: "_posts"
      type: "posts"
    values:
      layout: "post"
      math: false  # 先关闭MathJax，避免加载失败阻塞构建
      author: "Duckweed" # 默认作者
      render_with_liquid: true  # ✅ 关键修复：开启文章的Liquid解析

  # 非文章页面配置：仅给纯页面关闭Liquid解析（不影响文章）
  - scope:
      path: ""
      type: "pages"
      exclude: "_posts"  # ✅ 关键修复：排除文章目录，避免覆盖
    values:
      layout: "default"
      render_with_liquid: false  # 仅关闭纯页面的Liquid解析（避免LaTeX误解析）
      permalink: /:basename/ # 页面链接格式（archive.html → /archive/）

  # 根目录index.md配置：开启Liquid解析，确保能渲染文章列表
  - scope:
      path: "index.md"
      type: "pages"
    values:
      layout: "default"
      permalink: "/"
      render_with_liquid: true  # ✅ 关键修复：开启首页Liquid解析（显示文章列表）

# 分页配置（后续启用分页插件时取消注释）
# paginate: 5
# paginate_path: "/page/:num/"

# 导航栏配置（注释掉，先保证文章显示，后续再加）
# header_pages:
