# ===================== 站点核心配置 =====================
title: Duckweed's Space
email: 3071974740@qq.com
description: >-
  Duckweed的个人成长空间，记录编程学习、考研备考、读书思考的点滴
baseurl: "" # 根目录部署无需修改
url: "https://Duckweed-yhb.github.io" # GitHub Pages 地址
timezone: Asia/Shanghai # 时区：上海
lang: zh-CN # 站点语言：简体中文
github_username: Duckweed-yhb
logo: "/assets/images/bg.jpg" # 新增：站点logo（可选）
favicon: "/assets/images/bg.jpg" # 新增：浏览器标签页图标

# ===================== 主题与插件配置 =====================
theme: minima
plugins:
  - jekyll-feed # RSS 订阅
  - jekyll-seo-tag # SEO 优化
  - jekyll-sitemap # 新增：生成站点地图（利于SEO）
  # - jekyll-paginate  # 分页插件（后续需要时取消注释）

# ===================== 内容配置 =====================
# 全局默认布局与属性
defaults:
  # 文章默认配置
  - scope:
      path: "_posts"
      type: "posts"
    values:
      layout: "post"
      math: true # 所有文章默认加载MathJax
      permalink: /posts/:title/ # 文章永久链接格式
      author: "Duckweed" # 新增：默认作者

  # pages目录下页面默认配置
  - scope:
      path: "pages"
      type: "pages"
    values:
      layout: "default"
      permalink: /:basename/ # 新增：pages页面链接格式（archive.md → /archive/）

  # 根目录index.md配置
  - scope:
      path: "index.md"
      type: "pages"
    values:
      layout: "default"
      permalink: "/"

  # 根目录exhibition.md配置（如果展览页在根目录）
  - scope:
      path: "exhibition.md"
      type: "pages"
    values:
      layout: "default"
      permalink: /exhibition/

# 分页配置（后续启用分页插件时取消注释）
# paginate: 5
# paginate_path: "/page/:num/"

# 导航栏配置（补充展览页，调整顺序更合理）
header_pages:
  - pages/archive.md # 档案
  - pages/friends.md # 友链
  - pages/about.md # 关于
  - pages/exhibition.md # 展览（根目录）| 若在pages目录则写 pages/exhibition.md

# ===================== 排除文件/目录 =====================
exclude:
  - .sass-cache/
  - .jekyll-cache/
  - gemfiles/
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - vendor/
  - LICENSE
  - templates/
  - scripts/
  - requirements.txt
  - README.md # 取消注释：排除根目录README.md（避免生成页面）

# ===================== Minima主题自定义 =====================
minima:
  social_links:
    # Minima 2.5+ 支持的社交平台
    - { platform: github, user_url: "https://github.com/Duckweed-yhb" }
    - { platform: email, user_url: "mailto:3071974740@qq.com" }
    # 新增：自定义社交链接（需配合header.html修改，可选）
    # - { platform: zhihu,   user_url: "https://www.zhihu.com/people/54-62-1-34-68" }
    # - { platform: bilibili, user_url: "https://space.bilibili.com/3546703303019495" }
  skin: auto # 自动适配系统暗黑/亮色模式

# ===================== 编码与格式 =====================
encoding: utf-8
date_format: "%Y-%m-%d %H:%M" # 日期显示格式

# ===================== Markdown解析配置 =====================
highlighter: rouge # 代码高亮
markdown: kramdown
kramdown:
  input: GFM # 支持GitHub风格Markdown
  parse_block_html: true # 解析HTML块级标签内的Markdown（核心）
  parse_span_html: true # 解析HTML行内标签内的Markdown（核心）
  auto_ids: true # 自动为标题生成ID
  footnote_nr: 1 # 脚注编号起始值
  syntax_highlighter_opts:
    block:
      line_numbers: false # 关闭代码行号（避免样式混乱）

# ===================== 自定义社交配置（供页面调用） =====================
social:
  zhihu:
    url: "https://www.zhihu.com/people/54-62-1-34-68"
    username: "待价而沽"
  bilibili:
    url: "https://space.bilibili.com/3546703303019495"
    username: "Duckweed"
  github:
    url: "https://github.com/Duckweed-yhb"
    username: "Duckweed-yhb"
