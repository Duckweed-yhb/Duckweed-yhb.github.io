# ===================== 站点核心配置 =====================
title: Duckweed's Space
email: 3071974740@qq.com
description: >-
  Duckweed的个人成长空间，记录编程学习、考研备考、读书思考的点滴
baseurl: ""
url: "https://Duckweed-yhb.github.io"
timezone: Asia/Shanghai
lang: zh-CN
github_username: Duckweed-yhb

# ===================== 主题与插件配置 =====================
theme: minima
plugins:
  - jekyll-feed
  - jekyll-paginate
  - jekyll-seo-tag

# ===================== 内容配置 =====================
defaults:
  # 文章默认使用 post 布局
  - scope:
      path: "_posts"
      type: "posts"
    values:
      layout: "post"
      math: true
      permalink: /posts/:title/

  # pages 目录下的页面默认使用 default 布局
  - scope:
      path: "pages"
      type: "pages"
    values:
      layout: "default"

  # 根目录 index.md 强制使用 default 布局（简化匹配规则，避免GitHub Pages解析异常）
  - scope:
      path: "index.md"
      type: "pages"
    values:
      layout: "default"
      permalink: "/"

# 分页配置
paginate: 5
paginate_path: "/page/:num/"

# 导航栏配置
header_pages:
  - pages/archive.md
  - pages/friends.md
  - pages/about.md

# ===================== 排除文件 =====================
exclude:
  - .sass-cache/
  - .jekyll-cache/
  - gemfiles/
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - vendor/
  - LICENSE
  - templates/
  - scripts/
  - requirements.txt
  # 关键修复：移除 README.md 排除，否则GitHub Pages可能无法访问
  # - README.md

# ===================== Minima主题自定义 =====================
minima:
  social_links:
    # 关键修复：minima主题仅支持有限的内置platform，zhihu不在其中，改用link类型
    - { platform: github,  user_url: "https://github.com/Duckweed-yhb" }
    - { platform: email,   user_url: "mailto:3071974740@qq.com" }
    - { platform: link,    name: "知乎", user_url: "https://www.zhihu.com/people/54-62-1-34-68" }
    - { platform: link,    name: "B站", user_url: "https://space.bilibili.com/3546703303019495" }
  skin: auto

# ===================== 编码与格式 =====================
encoding: utf-8
date_format: "%Y-%m-%d %H:%M"

# ===================== 额外优化配置 =====================
# 关键修复：GitHub Pages 不支持 rouge 的 line_numbers，注释掉避免报错
highlighter: rouge
markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter_opts:
    block:
      # line_numbers: true  # GitHub Pages 环境下会报错，暂时注释

# 补充社交配置（供social.html调用）
zhihu_url: https://www.zhihu.com/people/54-62-1-34-68
zhihu_username: 待价而沽
bilibili_url: https://space.bilibili.com/3546703303019495
bilibili_username: Duckweed