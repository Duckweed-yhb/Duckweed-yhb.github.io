name: Auto Update README (Jekyll Blog)

# 修复核心：paths和paths-ignore同层级放在push事件内
on:
  push:
    branches: [ main, master ]
    paths:
      - '_posts/**/*.md'
      - '_posts/**/*.markdown'
      - 'templates/**'
      - 'scripts/**'
      - 'README.md'
      - '.github/workflows/**'
    paths-ignore:
      - '_site/**'
      - '.jekyll-cache/**'
      - 'vendor/**'
  workflow_dispatch:  # 手动触发
  schedule:
    - cron: '0 0 * * *'  # 每天UTC 0点（北京时间8点）更新

# 并发控制：避免冲突
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update-readme:
    runs-on: ubuntu-latest
    if: github.repository_owner == github.actor || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
      pull-requests: write
      actions: read
    steps:
      - name: 拉取仓库代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ github.token }}
          ref: ${{ github.ref }}

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: |
          set -e
          python -m pip install --upgrade pip
          pip install --retries 3 --timeout 30 pyyaml || pip install --user pyyaml

      - name: 检查生成脚本是否存在
        id: check_script
        run: |
          if [ -f "scripts/generate_readme.py" ]; then
            echo "script_exists=true" >> $GITHUB_OUTPUT
            echo "✅ 找到生成脚本：scripts/generate_readme.py"
          else
            echo "script_exists=false" >> $GITHUB_OUTPUT
            echo "❌ 错误：scripts/generate_readme.py 文件不存在！"
          fi

      - name: 生成 README 内容
        if: steps.check_script.outputs.script_exists == 'true'
        run: |
          set -e
          cd $GITHUB_WORKSPACE
          python scripts/generate_readme.py
          if [ -f "README.md" ]; then
            echo "✅ README.md 文件存在，生成成功！"
            head -20 README.md
          else
            echo "❌ 错误：README.md 文件生成失败！"
            exit 1
          fi

      - name: 提交更新
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: auto update README from Jekyll posts [skip ci]"
          file_pattern: "README.md"
          branch: ${{ github.ref_name }}
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"
          skip_fetch: true
          skip_checkout: true
          commit_author: "GitHub Actions <actions@github.com>"

      - name: 脚本不存在时的容错处理
        if: steps.check_script.outputs.script_exists == 'false'
        run: |
          echo "❌ 终止工作流：缺少核心生成脚本！"
          exit 1

      - name: 工作流完成通知
        if: always()
        run: |
          echo "📝 README更新工作流执行完成！"
          echo "状态：${{ job.status }}"
          echo "日志链接：https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"