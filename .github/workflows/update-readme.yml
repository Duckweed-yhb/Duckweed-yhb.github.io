name: Auto Update README (Jekyll Blog)

on:
  push:
    branches: [ main, master ]
    paths-ignore:
      - '.github/**'
      - '_site/**'
      - '.jekyll-cache/**'
      - 'vendor/**'
      - 'Gemfile.lock'

  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

concurrency:
  group: update-readme-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update-readme:
    runs-on: ubuntu-latest
    if: github.repository_owner == github.actor || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ github.token }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml

      - name: Generate full README
        run: python scripts/generate_readme.py

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: auto-update README with full blog content [skip ci]"
          file_pattern: README.md
          branch: ${{ github.ref_name }}
          commit_user_name: github-actions[bot]
          commit_user_email: github-actions[bot]@users.noreply.github.com