name: Build and deploy Jekyll site to GitHub Pages

on:
  push:
    branches: [ main, master ]  # 去掉 paths 限制，所有 push 都触发
  workflow_dispatch:  # 保留手动触发

concurrency:
  group: pages-jekyll-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Ruby 3.1（适配GitHub Pages）
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1'
          bundler-cache: true  # 恢复缓存（关闭缓存易导致依赖问题）

      - name: 清理旧构建产物和依赖
        run: |
          rm -rf _site .jekyll-cache Gemfile.lock vendor
          bundle install --full-index --path vendor/bundle

      - name: Build Jekyll site（带详细日志）
        run: bundle exec jekyll build --trace --baseurl ""
        env:
          JEKYLL_ENV: production
          LC_ALL: C.UTF-8  # 关键：强制UTF8编码，解决中文解析问题

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          token: ${{ github.token }}