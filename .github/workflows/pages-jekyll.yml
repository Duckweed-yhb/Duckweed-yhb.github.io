name: Build and deploy Jekyll site to GitHub Pages

on:
  # 核心修复：用否定匹配替代 paths-ignore，二选一符合语法规范
  push:
    branches: [ main, master ]
    paths:
      # 只触发核心博客文件的构建
      - '_posts/**'
      - '_includes/**'
      - '_layouts/**'
      - '_config.yml'
      - 'assets/**'
      - 'pages/**'
      - 'index.md'  # 新增：确保首页修改触发构建
      # 排除 README 和脚本相关文件，避免被自动提交触发
      - '!README.md'
      - '!scripts/**'
      - '!.github/workflows/update-readme.yml'
  # 保留手动触发，方便调试
  workflow_dispatch:

# 独立并发组，不和 README 更新冲突
concurrency:
  group: pages-jekyll-${{ github.ref }}
  cancel-in-progress: false  # 不取消正在运行的构建，避免被中断

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write  # 构建阶段需要的身份令牌权限
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 拉取完整历史，适配 Jekyll 插件

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'  # 适配 Jekyll 的 Ruby 版本
          bundler-cache: true  # 缓存依赖，加速构建

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:  # 核心修复：给部署阶段添加必要权限
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4