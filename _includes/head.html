<!-- _includes/head.html - 页面头部核心组件 -->
<meta charset="utf-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge, chrome=1">
<!-- 视口设置：禁止缩放+适配刘海屏/全面屏 -->
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">

<!-- 图标配置（移除不存在的图标文件引用，避免404） -->
<!-- 如需使用favicon，先将文件放到根目录 -->
<link rel="icon" type="image/png" href="{{ '/favicon.png' | relative_url }}" sizes="64x64">
<link rel="shortcut icon" href="{{ '/favicon.ico' | relative_url }}" type="image/x-icon">

<!-- 原有核心SEO功能（移除不存在的meta-seo.html） -->
{%- seo -%}

<!-- 样式加载优化：简化preload，避免阻塞渲染 -->
<link rel="stylesheet" href="{{ "/assets/css/custom-bg.css" | relative_url }}">
<link rel="stylesheet" href="{{ "/assets/css/main.css" | relative_url }}">
<link rel="stylesheet" href="{{ "/assets/css/header.css" | relative_url }}">

<!-- 引入Font Awesome图标库（仅保留CDN，移除本地降级，避免404） -->
<link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<!-- RSS订阅 -->
{%- feed_meta -%}

<!-- 谷歌分析（仅在配置了google_analytics时加载） -->
{%- if jekyll.environment == 'production' and site.google_analytics -%}
  <script async src="https://www.googletagmanager.com/gtag/js?id={{ site.google_analytics }}"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', '{{ site.google_analytics }}');
  </script>
{%- endif -%}
