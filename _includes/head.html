<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge, chrome=1"> <!-- 增加chrome=1，提升Chrome兼容性 -->
  <!-- 优化视口设置：禁止缩放+适配刘海屏/全面屏，提升移动端体验 -->
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  
  <!-- 1. 图标优化：多尺寸favicon + 移动端应用图标，适配不同设备 -->
  <!-- 基础favicon（64x64） -->
  <link rel="icon" type="image/png" href="/favicon.png" sizes="64x64">
  <!-- 补充常用尺寸，适配不同浏览器/设备 -->
  <link rel="icon" type="image/png" href="/favicon-32x32.png" sizes="32x32">
  <link rel="icon" type="image/png" href="/favicon-16x16.png" sizes="16x16">
  <!-- 移动端应用图标（添加到主屏幕时显示） -->
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <!-- 可选：配置favicon的ico格式，兼容老旧浏览器 -->
  <link rel="shortcut icon" href="/favicon.ico" type="image/x-icon">

  <!-- 2. SEO 增强：补充核心元标签，提升搜索表现 -->
  <meta name="robots" content="index, follow"> <!-- 告诉搜索引擎索引并跟踪链接 -->
  <meta name="theme-color" content="#0a1a3a"> <!-- 适配移动端浏览器顶部栏颜色（和你的背景色统一） -->
  <meta name="description" content="{{ site.description | default: site.title | escape }}"> <!-- 确保描述存在 -->
  <meta name="author" content="{{ site.author | default: site.title | escape }}"> <!-- 作者信息 -->
  <!-- Open Graph 协议：优化社交分享（微信/微博等） -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="{% if page.title %}{{ page.title | escape }}{% else %}{{ site.title | escape }}{% endif %}">
  <meta property="og:description" content="{{ page.excerpt | default: site.description | strip_html | truncate: 160 | escape }}">
  <meta property="og:url" content="{{ page.url | absolute_url }}">
  <meta property="og:site_name" content="{{ site.title | escape }}">
  <!-- Twitter 卡片：优化推特分享（可选） -->
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="{% if page.title %}{{ page.title | escape }}{% else %}{{ site.title | escape }}{% endif %}">
  <meta name="twitter:description" content="{{ page.excerpt | default: site.description | strip_html | truncate: 160 | escape }}">

  <!-- 3. 原有核心功能保留 -->
  {%- seo -%}

  <!-- 4. 样式加载优化：preload预加载主样式，提升首屏加载速度 -->
  <link rel="preload" href="{{ "/assets/main.css" | relative_url }}" as="style" onload="this.onload=null;this.rel='stylesheet'">
  <noscript>
    <link rel="stylesheet" href="{{ "/assets/main.css" | relative_url }}">
  </noscript>

  <!-- 5. 兼容性增强：引入Font Awesome（如果你用了图标，如页脚的邮箱/电话图标） -->
  <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  {%- feed_meta -%}

  <!-- 6. 分析工具优化：异步加载谷歌分析，不阻塞页面渲染 -->
  {%- if jekyll.environment == 'production' and site.google_analytics -%}
    <script async src="https://www.googletagmanager.com/gtag/js?id={{ site.google_analytics }}"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', '{{ site.google_analytics }}');
    </script>
  {%- endif -%}

  <!-- 7. 可选：预加载常用字体/资源（按需启用） -->
  <!-- <link rel="preload" href="/fonts/Microsoft-Yahei.woff2" as="font" type="font/woff2" crossorigin> -->
</head>
